}`,T=I(),f=u("h3"),f.textContent="Benefits of XML XTCE to FlatBuffer XTC",b=I(),v=u("div"),v.innerHTML='<div class="benefit-item svelte-16tzn0g"><div class="benefit-header svelte-16tzn0g"><span class="benefit-number svelte-16tzn0g">10-50x</span> <span>Smaller Files</span></div> <p class="svelte-16tzn0g">Typical XTCE databases shrink from megabytes to hundreds of kilobytes.</p></div> <div class="benefit-item svelte-16tzn0g"><div class="benefit-header svelte-16tzn0g"><span class="benefit-number svelte-16tzn0g">100x</span> <span>Faster Loading</span></div> <p class="svelte-16tzn0g">No XML parsing required. Direct memory-mapped access to telemetry definitions.</p></div> <div class="benefit-item svelte-16tzn0g"><div class="benefit-header svelte-16tzn0g"><span class="benefit-number svelte-16tzn0g">Type-Safe</span> <span>Access</span></div> <p class="svelte-16tzn0g">Compile-time type checking for parameter types, encodings, and calibrations.</p></div> <div class="benefit-item svelte-16tzn0g"><div class="benefit-header svelte-16tzn0g"><span class="benefit-number svelte-16tzn0g">Embedded</span> <span>Friendly</span></div> <p class="svelte-16tzn0g">Small footprint suitable for on-board software and resource-constrained systems.</p></div>',y=I(),S=u("div"),O=u("a"),O.textContent="View XTC Schema",l(t,"class","xtce-intro svelte-16tzn0g"),l(r,"class","subsection-title svelte-16tzn0g"),l(o,"class","info-cards svelte-16tzn0g"),l(d,"class","subsection-title svelte-16tzn0g"),l(_,"class","intro-text svelte-16tzn0g"),l(m,"class","schema-code svelte-16tzn0g"),l(E,"class","schema-structure svelte-16tzn0g"),l(f,"class","subsection-title svelte-16tzn0g"),l(v,"class","benefit-comparison svelte-16tzn0g"),l(O,"href","/schemas/XTC"),l(O,"class","btn btn-accent svelte-16tzn0g"),l(S,"class","cta-inline svelte-16tzn0g"),l(e,"class","section-content svelte-16tzn0g")},m(R,w){Z(R,e,w),a(e,t),a(e,s),a(e,r),a(e,i),a(e,o),a(e,c),a(e,d),a(e,p),a(e,_),a(e,h),a(e,E),a(E,m),a(e,T),a(e,f),a(e,b),a(e,v),a(e                 encrypted while headers and routing information remain readable. The canonical
                recipient flow is header-first: send <code>$ENC</code> first, then send the
                encrypted payload, typically wrapped in <code>$REC</code> so the receiver knows
                which generated schema to consume for the decrypt step.`,s=I(),r=u("div"),i=u("pre"),i.textContent=`
+----------------------------------------------+
| 1. $ENC Header (sent first, unencrypted)     |
+----------------------------------------------+
| KEY_EXCHANGE: X25519                         |
| EPHEMERAL_PUBLIC_KEY: sender ephemeral key   |
| NONCE_START: random nonce base               |
| ROOT_TYPE: "KMF" (or other generated type)   |
| CONTEXT: recipient / application domain      |
+----------------------------------------------+
| 2. $REC Wrapper (payload selector)           |
+----------------------------------------------+
| RECORD_TYPE: KMF                             |
| RECORD_BYTES: encrypted generated payload    |
+----------------------------------------------+
| 3. Encrypted Payload                         |
+----------------------------------------------+
| KMF {                                        |
|   KEY_ID: "module/dek/default"               |
|   KEY_BYTES: [ENCRYPTED FIELD]               |
|   EXPIRES_AT: 1760000000000                  |
| }                                            |
+----------------------------------------------+
| 4. Bob Decrypt                               |
+----------------------------------------------+
| Read $ENC first                              |
| Read $REC to locate/generated root type      |
| Derive shared secret with Bob private key    |
| Decrypt encrypted fields in payload          |
| Consume generated KMF/REC bindings locally   |
+----------------------------------------------+`,o=I(),c=u("h3"),c.textContent="Header-First Recipient Encryption",d=I(),p=u("div"),p.innerHTML='<div class="encrypt-card svelte-16tzn0g"><h4 class="svelte-16tzn0g">$ENC First</h4> <p class="svelte-16tzn0g">The encryption header is transmitted before the payload so the receiver can derive the correct decrypt context before touching encrypted fields.</p></div> <div class="encrypt-card svelte-16tzn0g"><h4 class="svelte-16tzn0g">$REC Consumption</h4> <p class="svelte-16tzn0g">The encrypted payload should be carried in the generated <code>$REC</code> wrapper so Bob can identify the generated schema type and run the correct decrypt path.</p></div> <div class="encrypt-card svelte-16tzn0g"><h4 class="svelte-16tzn0g">Per-Field Protection</h4> <p class="svelte-16tzn0g">Fields marked <code>(encrypted)</code> stay in their generated FlatBuffer layout while sensitive bytes, such as <code>KMF.KEY_BYTES</code>, are protected for the intended recipient.</p></div>',_=I(),h=u("h3"),h.textContent="Bob Decrypt Checklist",E=I(),m=u("div"),m.innerHTML='<div class="use-case svelte-16tzn0g"><span class="use-case-icon svelte-16tzn0g">1</span> <div><strong class="svelte-16tzn0g">Read <code>$ENC</code> Before Payload</strong> <p class="svelte-16tzn0g">Bob must parse the encryption header first to recover the ephemeral public key, nonce base, and generated root type information.</p></div></div> <div class="use-case svelte-16tzn0g"><span class="use-case-icon svelte-16tzn0g">2</span> <div><strong class="svelte-16tzn0g">Consume the Generated <code>$REC</code> Wrapper</strong> <p class="svelte-16tzn0g">The payload should be consumed through generated <code>REC</code> bindings so Bob can resolve the record type and dispatch to the correct generated schema before decrypting fields.</p></div></div> <div class="use-case svelte-16tzn0g"><span class="use-case-icon svelte-16tzn0g">3</span> <div><strong class="svelte-16tzn0g">Decrypt Encrypted Fields In-Place</strong> <p class="svelte-16tzn0g">Once Bob derives the shared secret from the header, he decrypts the encrypted fields in the generated payload buffer and then reads the normal generated object graph.</p></div></div>',T=I(),f=u("h3"),f.textContent="Use Cases",b=I(),v=u("div"),v.innerHTML='<div class="use-case svelte-16tzn0g"><span class="use-case-icon svelte-16tzn0g">1</span> <div><strong class="svelte-16tzn0g">Public Network Distribution</strong> <p class="svelte-16tzn0g">Share CDM messages on public networks where routing information must be visible but collision details are protected.</p></div></div> <div class="use-case svelte-16tzn0g"><span class="use-case-icon svelte-16tzn0g">2</span> <div><strong class="svelte-16tzn0g">Multi-Party Access Control</strong> <p class="svelte-16tzn0g">Different fields encrypted for different recipients. Satellite operators see their own data, regulators see aggregate statistics.</p></div></div> <div class="use-case svelte-16tzn0g"><span class="use-case-icon svelte-16tzn0g">3</span> <div><strong class="svelte-16tzn0g">Audit-Friendly Sharing</strong> <p class="svelte-16tzn0g">Message metadata remains visible for logging and compliance while payload stays confidential.</p></div></div>',l(t,"class","intro-text svelte-16tzn0g"),l(i,"class","ascii-diagram svelte-16tzn0g"),l(r,"class","encryption-diagram svelte-16tzn0g"),l(c,"class","subsection-title svelte-16tzn0g"),l(p,"class","encryption-features svelte-16tzn0g"),l(h,"class","subsection-title svelte-16tzn0g"),l(m,"class","use-case-list svelte-16tzn0g"),l(f,"class","subsection-title svelte-16tzn0g"),l(v,"class","use-case-list svelte-16tzn0g"),l(e,"class","section-content svelte-16tzn0g")},m(y,S){Z(y,e,S),a(e,t),a(e,s),a(e,r),a(r,i),a(e,o),a(e,c),a(e,d),a(e,p),a(e,_),a(e,h),a(e,E),a(e,m),a(e,T),a(e,f),a(e,b),a(e,v)},d(y){y&&J(e)}}}function Gi(n){let e,t,s,r,i,o,c,d,p,_,h,E,m,T,f,b,v,y,S,O,M,D,R,w,F,V;return{c(){e=u("div"),t=u("h3"),t.textContent="TLE to OMM Migration",s=I(),r=u("di         OBJECT_ID: tle.noradId,
        EPOCH: tle.epoch,
        MEAN_MOTION: tle.meanMotion,
        // ... map all fields
      }));
      break;

    case 'xml':
      // Parse CCSDS XML OMM
      const xml = await fetch(source).then(r => r.text());
      messages = parseXmlOmm(xml);
      break;

    case 'json':
      // Parse JSON OMM (Space-Track format)
      const json = await fetch(source).then(r => r.json());
      messages = parseJsonOmm(json);
      break;

    case 'flatbuffer':
      // Already in optimal format - zero conversion

      return readFB(new Uint8Array(buffer));
  }
