+----------------------------------------------+
| 1. $ENC Header (sent first, unencrypted)     |
+----------------------------------------------+
| KEY_EXCHANGE: X25519                         |
| EPHEMERAL_PUBLIC_KEY: sender ephemeral key   |
| NONCE_START: random nonce base               |
| ROOT_TYPE: "KMF" (or other generated type)   |
| CONTEXT: recipient / application domain      |
+----------------------------------------------+
| 2. $REC Wrapper (payload selector)           |
+----------------------------------------------+
| RECORD_TYPE: KMF                             |
| RECORD_BYTES: encrypted generated payload    |
+----------------------------------------------+
| 3. Encrypted Payload                         |
+----------------------------------------------+
| KMF {                                        |
|   KEY_ID: "module/dek/default"               |
|   KEY_BYTES: [ENCRYPTED FIELD]               |
|   EXPIRES_AT: 1760000000000                  |
| }                                            |
+----------------------------------------------+
| 4. Bob Decrypt                               |
+----------------------------------------------+
| Read $ENC first                              |
| Read $REC to locate/generated root type      |
| Derive shared secret with Bob private key    |
| Decrypt encrypted fields in payload          |
| Consume generated KMF/REC bindings locally   |
+----------------------------------------------+`,o=k(),c=h("h3"),c.textContent="Header-First Recipient Encryption",d=k(),p=h("div"),p.innerHTML='<div class="encrypt-card svelte-16tzn0g"><h4 class="svelte-16tzn0g">$ENC First</h4> <p class="svelte-16tzn0g">The encryption header is transmitted before the payload so the receiver can derive the correct decrypt context before touching encrypted fields.</p></div> <div class="encrypt-card svelte-16tzn0g"><h4 class="svelte-16tzn0g">$REC Consumption</h4> <p class="svelte-16tzn0g">The encrypted payload should be carried in the generated <code>$REC</code> wrapper so Bob can identify the generated schema type and run the correct decrypt path.</p></div> <div class="encrypt-card svelte-16tzn0g"><h4 class="svelte-16tzn0g">Per-Field Protection</h4> <p class="svelte-16tzn0g">Fields marked <code>(encrypted)</code> stay in their generated FlatBuffer layout while sensitive bytes, such as <code>KMF.KEY_BYTES</code>, are protected for the intended recipient.</p></div>',_=k(),m=h("h3"),m.textContent="Bob Decrypt Checklist",T=k(),u=h("div"),u.innerHTML='<div class="use-case svelte-16tzn0g"><span class="use-case-icon svelte-16tzn0g">1</span> <div><strong class="svelte-16tzn0g">Read <code>$ENC</code> Before Payload</strong> <p class="svelte-16tzn0g">Bob must parse the encryption header first to recover the ephemeral public key, nonce base, and generated root type information.</p></div></div> <div class="use-case svelte-16tzn0g"><span class="use-case-icon svelte-16tzn0g">2</span> <div><strong class="svelte-16tzn0g">Consume the Generated <code>$REC</code> Wrapper</strong> <p class="svelte-16tzn0g">The payload should be consumed through generated <code>REC</code> bindings so Bob can resolve the record type and dispatch to the correct generated schema before decrypting fields.</p></div></div> <div class="use-case svelte-16tzn0g"><span class="use-case-icon svelte-16tzn0g">3</span> <div><strong class="svelte-16tzn0g">Decrypt Encrypted Fields In-Pl import { generateKeyPair, deriveSharedSecret } from './crypto';

  OMMT, CDMT, writeFB, readFB,
  parseTLE, parseXmlCdm, parseJsonOmm
} from 'spacedatastandards.org';

// Unified ingestion pipeline
async function ingestOrbitalData(source: string, format: string) {
  let messages: OMMT[];

  switch (format) {
    case 'tle':
      // Parse TLE and convert to OMM
      const tles = await fetch(source).then(r => r.text());
      messages = parseTLE(tles).map(tle => new OMMT({
        OBJECT_NAME: tle.name,
        OBJECT_ID: tle.noradId,
        EPOCH: tle.epoch,
        MEAN_MOTION: tle.meanMotion,
        // ... map all fields
      }));
      break;

    case 'xml':
      // Parse CCSDS XML OMM
      const xml = await fetch(source).then(r => r.text());
      messages = parseXmlOmm(xml);
      break;

    case 'json':
      // Parse JSON OMM (Space-Track format)
      const json = await fetch(source).then(r => r.json());
      messages = parseJsonOmm(json);
      break;

    case 'flatbuffer':
      // Already in optimal format - zero conversion
      const buffer = await fetch(source).then(r => r.arrayBuffer());
      return readFB(new Uint8Array(buffer));
  }

  // Convert all formats to FlatBuffer for storage/processing
  return writeFB(messages);
}`,x=k(),R=h("h3"),R.textContent="Working with XTC Telemetry",N=k(),U=h("div"),H=h("div"),H.textContent="TypeScript: XTC Parameter Access",ie=k(),w=h("pre"),w.textContent=`import { readFB } from 'spacedatastandards.org';

// Load XTC telemetry database (memory-mapped for large files)
const xtcBuffer = await loadXtcDatabase('./spacecraft.xtc');
const xtc = readFB(xtcBuffer)[0];

// Navigate hierarchical space system
console.log(xtc.NAME);  // "SPACECRAFT-1"

// Access parameter type definitions
const paramTypes = xtc.TELEMETRY_META_DATA?.PARAMETER_TYPE_SET;
const floatTypes = paramTypes?.FLOAT_TYPES || [];

for (const type of floatTypes) {
  console.log(\`Parameter: \${type.NAME}\`);
  console.log(\`  Units: \${type.UNITS?.[0]?.SYMBOL}\`);
  console.log(\`  Valid Range: \${type.VALID_MIN} - \${type.VALID_MAX}\`);

  // Access calibration if defined
  const encoding = type.DATA_ENCODING;
  if (encoding?.DEFAULT_CALIBRATOR) {
    console.log(\`  Calibrator: \${encoding.DEFAULT_CALIBRATOR}\`);
  }
}

// Access container (packet) definitions
const containers = xtc.TELEMETRY_META_DATA?.CONTAINER_SET?.CONTAINERS || [];
for (const container of containers) {
